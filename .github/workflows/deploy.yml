name: Deploy to Netlify

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Netlify (build on Linux)
        run: npx netlify-cli deploy --build --prod
        env:
          NETLIFY_AUTH_TOKEN: nfc_4pHVspcGjGNsYbKyRExHzes3kRpzoktZ3e5d
          NETLIFY_SITE_ID: e2c6ab6d-dd8a-4a8c-9383-7916678c70fc
